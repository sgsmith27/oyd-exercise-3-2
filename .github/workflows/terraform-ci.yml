name: Terraform CI

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Lambda Zip
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Lambda zip
        run: |
          cd app
          zip function.zip index.js

      - name: Upload Lambda zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-function-zip
          path: app/function.zip

  terraform:
    name: Terraform fmt, validate and plan
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Lambda zip artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-function-zip
          path: app

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        working-directory: infra
        run: terraform fmt --check -recursive

      - name: Terraform init
        working-directory: infra
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infra
        run: terraform validate

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform plan
        id: plan
        working-directory: infra
        run: terraform plan -var-file=envs/dev/dev.tfvars 2>&1 | tee plan.txt

      - name: Post Terraform plan as PR comment
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/plan.txt', 'utf8');

            const body = `## Terraform Plan

            <details>
            <summary>Terraform Plan</summary>

            \`\`\`terraform
            ${plan}
            \`\`\`

            </details>`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });